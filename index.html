<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>QFactory - Üretim Planlama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="startBtn">START FACTORY</button>
        <h2>Üretim Planlama: Klasik vs Kuantum</h2>
        <div id="progress-container"><div id="progress-bar">0%</div></div>
        <div id="timer">0 min</div>
    </header>

    <main class="factory-container">
        <div id="parts-list" class="column"><h3>PARÇALAR</h3></div>
        <canvas id="flowCanvas"></canvas>
        <div id="machines-list" class="column"><h3>MAKİNELER</h3></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
